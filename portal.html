            r => `<td>${r[C.desc]??''}</td><td class="pf-nowrap">${r[C.start]??''}</td><td class="pf-nowrap">${r[C.end]??''}</td><td>${r[C.notes]??''}</td>`,
            {s:C.start, e:C.end}
          ));
        } else {
          parent.appendChild(makeTable(
            '<th>المادّة / اسم الكتاب</th><th>من / إلى</th><th>وقت البدء</th><th>وقت الانتهاء</th><th>الحضور</th><th>الغياب</th><th>ملاحظات</th>',
            gr,
            r => `<td>${r[C.book]??''}</td><td>${r[C.fromTo]??''}</td><td class="pf-nowrap">${r[C.start]??''}</td><td class="pf-nowrap">${r[C.end]??''}</td><td>${r[C.present]??''}</td><td>${r[C.absent]??''}</td><td>${r[C.notes]??''}</td>`,
            {s:C.start, e:C.end}
          ));
        }
      });
    }

    function renderNFSection(parent, nfRows) {
      if (!nfRows.length) return;
      const hdr = document.createElement('div');
      hdr.className = 'pf-nf-header';
      hdr.textContent = 'الأعمال التي لم تتمّ ✗';
      parent.appendChild(hdr);

      // Consecutive same-type groups within NF
      const groups = [];
      nfRows.forEach(row => {
        const t = String(row[C.type]||'').trim();
        if (!groups.length || groups[groups.length-1].type !== t)
          groups.push({ type: t, rows: [row] });
        else
          groups[groups.length-1].rows.push(row);
      });

      const NF_COLOR = '#9B3030';
      groups.forEach(({ type, rows: gr }) => {
        parent.appendChild(typeLabel(type, NF_COLOR));
        if (type === 'مختلف') {
          const t = document.createElement('table'); t.className = 'pf-table';
          const thead = document.createElement('thead');
          thead.innerHTML = `<tr style="background:${NF_COLOR}"><th>وصف العمل</th><th>السبب</th><th>ملاحظات</th></tr>`;
          t.appendChild(thead);
          const tbody = document.createElement('tbody');
          gr.forEach(row => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${row[C.desc]??''}</td><td>${row[C.reason]??''}</td><td>${row[C.notes]??''}</td>`;
            tbody.appendChild(tr);
          });
          t.appendChild(tbody);
          parent.appendChild(t);
        } else {
          const t = document.createElement('table'); t.className = 'pf-table';
          const thead = document.createElement('thead');
          thead.innerHTML = `<tr style="background:${NF_COLOR}"><th>نوع العمل</th><th>المادّة / اسم الكتاب</th><th>السبب</th><th>ملاحظات</th></tr>`;
          t.appendChild(thead);
          const tbody = document.createElement('tbody');
          gr.forEach(row => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${row[C.type]??''}</td><td>${row[C.book]??''}</td><td>${row[C.reason]??''}</td><td>${row[C.notes]??''}</td>`;
            tbody.appendChild(tr);
          });
          t.appendChild(tbody);
          parent.appendChild(t);
        }
      });
    }

    order.forEach(name => {
      const personRows = grouped[name];
      const div = document.createElement('div');
      div.className = 'pf-responder';
      div.innerHTML = `
        <div class="pf-resp-bar" style="background:${meta.color}">
          <span class="pf-resp-bar-name">${name}</span>
          <span class="pf-resp-bar-meta">استمارة ${meta.sheet} · ${dateRange}</span>
        </div>`;

      // Group by work date
      const byDate = {}, dateOrder = [];
      personRows.forEach(row => {
        const d = String(row[C.date]||'').trim();
        if (!byDate[d]) { byDate[d] = []; dateOrder.push(d); }
        byDate[d].push(row);
      });

      dateOrder.forEach(date => {
        const allDay = byDate[date];
        const weekday = allDay[0][C.weekday] || '';
        const dh = document.createElement('div');
        dh.className = 'pf-day-header';
        dh.textContent = `${weekday}، ${formatIsoDate(date)}`;
        div.appendChild(dh);

        const doneRows = allDay
          .filter(r => String(r[C.status]||'').trim() === 'تمّ')
          .sort((a,b) => String(a[C.start]||'') < String(b[C.start]||'') ? -1 : 1);
        const nfRows = allDay.filter(r => String(r[C.status]||'').trim() === 'لم يتمّ');

        renderDoneGroups(div, doneRows);
        renderNFSection(div, nfRows);
      });

      // ملخّص الأعمال — pills
      const typeCounts = {};
      personRows.forEach(row => {
        const t = String(row[C.type]||'').trim();
        if (t) typeCounts[t] = (typeCounts[t]||0) + 1;
      });
      if (Object.keys(typeCounts).length) {
        const doneCount = personRows.filter(r => String(r[C.status]||'').trim() === 'تمّ').length;
        const nfCount   = personRows.filter(r => String(r[C.status]||'').trim() === 'لم يتمّ').length;
        const total     = doneCount + nfCount;
        const donePct   = total > 0 ? Math.round(doneCount / total * 100) : 0;
        const sb = document.createElement('div');
        sb.className = 'pf-summary-box';
        sb.innerHTML = `<div class="pf-summary-title" style="color:${meta.color}">ملخّص الأعمال</div>
          <div class="pf-summary-pills">${Object.entries(typeCounts).map(([t,c]) =>
            `<div class="pf-summary-pill" style="border-color:${meta.color};color:${meta.color}">
               <span class="pf-pill-count" style="background:${meta.color}">${c}</span>
               <span class="pf-pill-type">${t}</span>
             </div>`).join('')}</div>` +
          (total > 0 ? `<div class="pf-ratio-bar">
            <div class="pf-ratio-done" style="width:${donePct}%"></div>
            <div class="pf-ratio-nf"   style="width:${100 - donePct}%"></div>
          </div>
          <div class="pf-ratio-label">
            <span>✓ ${doneCount} تمّ</span>
            <span>${nfCount} لم يتمّ ✗</span>
          </div>` : '');
        div.appendChild(sb);
      }

      area.appendChild(div);
    });

    // Aggregate: per lesson type across all people (تمّ only, non-مختلف)
    const typeAgg = {};
    rows.forEach(row => {
      const status = String(row[C.status]||'').trim();
      const type   = String(row[C.type]||'').trim();
      if (status !== 'تمّ' || !type || type === 'مختلف') return;
      if (!typeAgg[type]) typeAgg[type] = [];
      typeAgg[type].push({
        date: String(row[C.date]||''), weekday: String(row[C.weekday]||''),
        person: String(row[C.responder]||''),
        book: String(row[C.book]||''), fromTo: String(row[C.fromTo]||''),
        start: String(row[C.start]||''), end: String(row[C.end]||''),
        present: String(row[C.present]||''), absent: String(row[C.absent]||''),
        notes: String(row[C.notes]||'')
      });
    });

    if (Object.keys(typeAgg).length) {
      const aggDiv = document.createElement('div');
      aggDiv.className = 'pf-responder';
      aggDiv.innerHTML = `
        <div class="pf-resp-bar" style="background:${meta.color}">
          <span class="pf-resp-bar-name">ملخّص الدروس</span>
          <span class="pf-resp-bar-meta">استمارة ${meta.sheet} · ${dateRange}</span>
        </div>`;

      // Bar chart: lessons per type
      const maxTypeCount = Math.max(...Object.values(typeAgg).map(a => a.length), 1);
      const barsDiv = document.createElement('div');
      barsDiv.className = 'pf-bars-section';
      barsDiv.innerHTML = '<div class="pf-bars-title">توزيع أعداد الدروس حسب النوع</div>';
      Object.entries(typeAgg).forEach(([type, items]) => {
        const pct = Math.max(3, (items.length / maxTypeCount) * 100);
        const row = document.createElement('div'); row.className = 'pf-bar-row';
        row.innerHTML = `<span class="pf-bar-label">${type}</span>
          <div class="pf-bar-wrap"><div class="pf-bar-fill" style="width:${pct}%;background:${meta.color}"></div></div>
          <span class="pf-bar-val">${items.length}</span>`;
        barsDiv.appendChild(row);
      });
      aggDiv.appendChild(barsDiv);

      Object.entries(typeAgg).forEach(([type, items]) => {
        const th = document.createElement('div');
        th.className = 'pf-type-header';
        th.style.color = meta.color;
        th.textContent = type;
        aggDiv.appendChild(th);

        const byDate = {}, dateOrder = [];
        items.forEach(item => {
          if (!byDate[item.date]) { byDate[item.date] = []; dateOrder.push(item.date); }
          byDate[item.date].push(item);
        });

        dateOrder.forEach(date => {
          const dayItems = byDate[date].sort((a,b) => a.start < b.start ? -1 : 1);
          const dh = document.createElement('div');
          dh.className = 'pf-day-header';
          dh.textContent = `${dayItems[0].weekday}، ${formatIsoDate(date)}`;
          aggDiv.appendChild(dh);

          const table = document.createElement('table');
          table.className = 'pf-table';
          const thead = document.createElement('thead');
          thead.innerHTML = `<tr style="background:${meta.color}"><th>المستجيب</th><th>المادّة / اسم الكتاب</th><th>من / إلى</th><th>وقت البدء</th><th>وقت الانتهاء</th><th>الحضور</th><th>الغياب</th><th>ملاحظات</th></tr>`;
          table.appendChild(thead);
          const tbody = document.createElement('tbody');
          dayItems.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${item.person}</td><td>${item.book}</td><td>${item.fromTo}</td><td class="pf-nowrap">${item.start}</td><td class="pf-nowrap">${item.end}</td><td>${item.present}</td><td>${item.absent}</td><td>${item.notes}</td>`;
            tbody.appendChild(tr);
          });
          table.appendChild(tbody);
          aggDiv.appendChild(table);
        });
      });

      area.appendChild(aggDiv);
    }
  }

  /* ── Generic form rendering (forms 5,6,9,10,11) ────────────── */
  /* ── Form 5 — مسؤول السّاحة ──────────────────────────────── */
  function renderForm5Pages(area, meta, headers, rows, order, grouped, dateRange) {
    // 0=ts,1=dt,2=responder,3=sahah,4=date,5=weekday,6=num,7=start,8=end,9=book,10=present,11=absent,12=notes
    const C = { responder:2, sahah:3, date:4, weekday:5, num:6, start:7, end:8, book:9, present:10, absent:11, notes:12 };

    function makeTable(dayRows) {
      const t = document.createElement('table'); t.className = 'pf-table';
      t.innerHTML = `<thead><tr style="background:${meta.color}"><th>رقم الدرس</th><th>اسم الكتاب</th><th>وقت البدء</th><th>وقت الانتهاء</th><th>الحضور</th><th>الغياب</th><th>ملاحظات</th></tr></thead>`;
      const tbody = document.createElement('tbody');
      dayRows.forEach(row => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${row[C.num]??''}</td><td>${row[C.book]??''}</td><td class="pf-nowrap">${row[C.start]??''}</td><td class="pf-nowrap">${row[C.end]??''}</td><td>${row[C.present]??''}</td><td>${row[C.absent]??''}</td><td>${row[C.notes]??''}</td>`;
        tbody.appendChild(tr);
        addElapsedRow(tbody, String(row[C.start]||''), String(row[C.end]||''), 7);
      });
      t.appendChild(tbody); return t;
    }

    function renderPerson(name) {
      const personRows = grouped[name];
      const div = document.createElement('div'); div.className = 'pf-responder';
      const sahah = String(personRows[0][C.sahah]||'');
      div.innerHTML = `<div class="pf-resp-bar" style="background:${meta.color}"><span class="pf-resp-bar-name">${name}</span><span class="pf-resp-bar-meta">${sahah ? sahah + ' · ' : ''}${dateRange}</span></div>`;
      const byDate = {}, dateOrder = [];
      personRows.forEach(row => { const d = String(row[C.date]||'').trim(); if (!byDate[d]) { byDate[d]=[]; dateOrder.push(d); } byDate[d].push(row); });
      dateOrder.forEach(date => {
        const dayRows = byDate[date].sort((a,b) => String(a[C.start]||'') < String(b[C.start]||'') ? -1 : 1);
        const dh = document.createElement('div'); dh.className = 'pf-day-header';
        dh.textContent = `${dayRows[0][C.weekday]||''}، ${formatIsoDate(date)}`;
        div.appendChild(dh); div.appendChild(makeTable(dayRows));
      });
      const totalP = personRows.reduce((s,r)=>s+(parseInt(r[C.present])||0),0);
      const totalA = personRows.reduce((s,r)=>s+(parseInt(r[C.absent])||0),0);
      if (totalP > 0 || totalA > 0) {
        const sb = document.createElement('div'); sb.className = 'pf-summary-box';
        sb.innerHTML = `<div class="pf-summary-title" style="color:${meta.color}">ملخّص الحضور</div><div class="pf-summary-pills">
          <div class="pf-summary-pill" style="border-color:#5AB467;color:#5AB467"><span class="pf-pill-count" style="background:#5AB467">${totalP}</span><span class="pf-pill-type">إجمالي الحضور</span></div>
          <div class="pf-summary-pill" style="border-color:#D03B3B;color:#D03B3B"><span class="pf-pill-count" style="background:#D03B3B">${totalA}</span><span class="pf-pill-type">إجمالي الغياب</span></div>
        </div>`;
        div.appendChild(sb);
      }
      area.appendChild(div);
    }

    // Group responders by sahah, then render each sahah section
    const bySahah = {}, sahahOrder = [];
    order.forEach(name => {
      const s = String(grouped[name][0][C.sahah]||'') || '(بدون ساحة)';
      if (!bySahah[s]) { bySahah[s]=[]; sahahOrder.push(s); }
      bySahah[s].push(name);
    });
    sahahOrder.forEach(sahah => {
      const sh = document.createElement('div'); sh.className = 'pf-sahah-header';
      sh.style.color = meta.color; sh.style.borderColor = meta.color;
      sh.textContent = sahah;
      area.appendChild(sh);
      bySahah[sahah].forEach(renderPerson);
    });
  }

  /* ── Form 10/11 — برنامج التشغيل ─────────────────────────── */

    // 0=ts,1=dt,2=responder,3=date,4=weekday,5=num,6=title,7=start,8=end,9=notes,10=gn
    const C = { responder:2, date:3, weekday:4, num:5, title:6, start:7, end:8, notes:9, gn:10 };

      const personRows = grouped[name];
      const div = document.createElement('div'); div.className='pf-responder';
      div.innerHTML=`<div class="pf-resp-bar" style="background:${meta.color}"><span class="pf-resp-bar-name">${name}</span><span class="pf-resp-bar-meta">استمارة ${meta.sheet} · ${dateRange}</span></div>`;

      const byDate={}, dateOrder=[];
      personRows.forEach(row=>{const d=String(row[C.date]||'').trim();if(!byDate[d]){byDate[d]=[];dateOrder.push(d);}byDate[d].push(row);});
      dateOrder.forEach(date=>{
        const dayRows=byDate[date].sort((a,b)=>String(a[C.start]||'')<String(b[C.start]||'')?-1:1);
        const dh=document.createElement('div'); dh.className='pf-day-header';
        dh.textContent=`${dayRows[0][C.weekday]||''}، ${formatIsoDate(date)}`;
        div.appendChild(dh);
        const t=document.createElement('table'); t.className='pf-table';
        t.innerHTML=`<thead><tr style="background:${meta.color}"><th>#</th><th>عنوان العمل</th><th>وقت البدء</th><th>وقت الانتهاء</th><th>ملاحظات</th></tr></thead>`;
        const tbody=document.createElement('tbody');
        dayRows.forEach(row=>{if(!String(row[C.title]||'').trim())return;const tr=document.createElement('tr');tr.innerHTML=`<td>${row[C.num]??''}</td><td>${row[C.title]??''}</td><td class="pf-nowrap">${row[C.start]??''}</td><td class="pf-nowrap">${row[C.end]??''}</td><td>${row[C.notes]??''}</td>`;tbody.appendChild(tr);addElapsedRow(tbody,String(row[C.start]||''),String(row[C.end]||''),5);});
        t.appendChild(tbody); div.appendChild(t);
      });

      const gnVal=String(personRows.find(r=>String(r[C.gn]||'').trim())?.[C.gn]||'').trim();
      if(gnVal){const el=document.createElement('div');el.className='pf-general-notes';el.style.borderColor=meta.color;el.innerHTML=`<strong>ملاحظات عامّة:</strong> ${gnVal}`;div.appendChild(el);}

      const workCount=personRows.filter(r=>String(r[C.title]||'').trim()).length;
      if(workCount>0){
        const sb=document.createElement('div'); sb.className='pf-summary-box';
        sb.innerHTML=`<div class="pf-summary-title" style="color:${meta.color}">ملخّص الأعمال</div><div class="pf-summary-pills">
          <div class="pf-summary-pill" style="border-color:${meta.color};color:${meta.color}"><span class="pf-pill-count" style="background:${meta.color}">${workCount}</span><span class="pf-pill-type">عمل مُنجز</span></div>
        </div>`;
        div.appendChild(sb);
      }
      area.appendChild(div);
    });
  }

  function renderGenericPages(area, meta, headers, rows, order, grouped, dateRange) {
    const tableHeaders   = headers.slice(DATA_START_COL);
    const lastHeader     = tableHeaders[tableHeaders.length - 1] || '';
    const hasGeneralNotes = lastHeader === 'ملاحظات عامّة' || lastHeader === 'التوصيات';
    const generalNotesCol = hasGeneralNotes ? headers.length - 1 : -1;
    const tableCols      = headers.map((h,i)=>i).slice(DATA_START_COL);
    const displayCols    = hasGeneralNotes ? tableCols.slice(0,-1) : tableCols;
    const displayHeaders = displayCols.map(i => headers[i]);
    const dayColIdx      = headers.indexOf('اليوم');
    const startTimeColIdx = headers.indexOf('وقت البدء');

    order.forEach(name => {
      const respRows = startTimeColIdx >= 0
        ? [...grouped[name]].sort((a, b) => String(a[startTimeColIdx]||'') < String(b[startTimeColIdx]||'') ? -1 : 1)
        : grouped[name];
      const div = document.createElement('div');
      div.className = 'pf-responder';

      const bar = document.createElement('div');
      bar.className = 'pf-resp-bar';
      bar.style.background = meta.color;
      bar.innerHTML = `<span class="pf-resp-bar-name">${name}</span><span class="pf-resp-bar-meta">استمارة ${meta.sheet} · ${dateRange}</span>`;
      div.appendChild(bar);

      const table = document.createElement('table');
      table.className = 'pf-table';
      const thead = document.createElement('thead');
      thead.innerHTML = `<tr style="background:${meta.color}">${displayHeaders.map(h=>`<th>${h}</th>`).join('')}</tr>`;
      table.appendChild(thead);
      const tbody = document.createElement('tbody');
      let lastDay = null;
      respRows.forEach(row => {
        const hasData = displayCols.some(i => String(row[i]||'').trim() !== '');
        if (!hasData) return;
        if (dayColIdx !== -1) {
          const dv = String(row[dayColIdx]||'').trim();
          if (dv && dv !== lastDay) {
            lastDay = dv;
            const dtr = document.createElement('tr');
            dtr.className = 'pf-day-row';
            dtr.innerHTML = `<td colspan="${displayCols.length}">${dv}</td>`;
            tbody.appendChild(dtr);
          }
        }
        const tr = document.createElement('tr');
        tr.innerHTML = displayCols.map(i => {
          const isTime = (headers[i]||'').includes('وقت');
          return `<td${isTime?' class="pf-nowrap"':''}>${row[i]??''}</td>`;
        }).join('');
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      div.appendChild(table);

      if (hasGeneralNotes) {
        const gnVal = String(respRows.find(r=>String(r[generalNotesCol]||'').trim())?.[generalNotesCol]||'').trim();
        if (gnVal) {
          const gn = document.createElement('div');
          gn.className = 'pf-general-notes';
          gn.style.borderColor = meta.color;
          gn.innerHTML = `<strong>${lastHeader}:</strong> ${gnVal}`;
          div.appendChild(gn);
        }
      }

      area.appendChild(div);
    });
  }

</script>
